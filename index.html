<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
  <div class="divFundo">
     <div>
 <input class="form-control input" type="text" placeholder="Insira o número" aria-label="default input example">
     </div>
   
   <div  role="group" aria-label="Second group" class="divBotao">
    
    <button type="button" class="btn btn-secondary botaoNum">1</button>
    <button type="button" class="btn btn-secondary botaoNum">2</button>
    </div>

    <div  role="group" aria-label="Second group" class="divBotao">
      <button type="button" class="btn btn-secondary botaoNum">3</button>
     <button type="button" class="btn btn-secondary botaoNum">4</button>
    </div>

    <div  role="group" aria-label="Second group" class="divBotao">
      <button type="button" class="btn btn-secondary botaoNum">5</button>
      <button type="button" class="btn btn-secondary botaoNum">6</button>
    </div>

     <div  role="group" aria-label="Second group" class="divBotao">
      <button type="button" class="btn btn-secondary botaoNum">7</button>
      <button type="button" class="btn btn-secondary botaoNum">8</button>
    </div>
    
    <div  role="group" aria-label="Second group" class="divBotao">
      <button type="button" class="btn btn-secondary botaoNum">9</button>
      <button type="button" class="btn btn-secondary botaoNum">0</button>
    </div>

  <div class="d-grid gap-2 d-md-block divBotao">
  <button class="btn btn-primary botaoNumC" type="button">+</button>
  <button class="btn btn-primary botaoNumC" type="button">-</button>

   <div class="d-grid gap-2 d-md-block divBotao" > 
  <button class="btn btn-primary botaoNumC " type="button">x</button>
  <button class="btn btn-primary botaoNumC " " type="button">/</button>
   </div>

  <div class="d-grid gap-2 d-md-block divBotao"> 
  <button class="btn btn-primary botaoNumC" type="button">AC</button>
  <button class="btn btn-primary botaoNumC type="button">=</button>
  </div>

</div>
  
 <script src="./assets/script.js">
    
</script>
</body>
</html>
